run:
  # Exclude examples directory from linting
  skip-dirs:
    - examples

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign

issues:
  # Maximum issues count per one linter
  max-issues-per-linter: 0
  # Maximum count of issues with the same text
  max-same-issues: 0

output:
  # Use colored-line-number format instead of deprecated github-actions
  format: colored-line-number
